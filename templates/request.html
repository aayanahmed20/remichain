{% extends "base.html" %}
{% block title %}Request Supplies — RemiChain{% endblock %}

{% block content %}
<h1>Request Supplies</h1>
<form method="POST" class="form-card">
  <label>Facility
    <select name="facility_id" required>
      {% for f in facilities %}
        <option value="{{ f.id }}">{{ f.name }} — {{ f.city }}</option>
      {% endfor %}
    </select>
  </label>

  <label>Item needed
    <input type="text" name="item_name" placeholder="e.g. Amoxicillin 500mg" required>
  </label>

  <label>Category
    <select name="category" required>
      <option value="medication">Medication</option>
      <option value="ppe">PPE</option>
      <option value="equipment">Equipment</option>
      <option value="consumable">Consumable</option>
    </select>
  </label>

  <div class="form-row">
    <label>Quantity needed
      <input type="number" name="quantity_needed" min="1" required>
    </label>
    <label>Unit
      <input type="text" name="unit" value="units">
    </label>
  </div>

  <label>Urgency
    <select name="urgency">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
  </label>

  <label>Notes
    <textarea name="notes" rows="3" placeholder="Any additional context"></textarea>
  </label>

  <button type="submit" class="btn btn-primary">Post Request</button>
</form>
{% endblock %}
